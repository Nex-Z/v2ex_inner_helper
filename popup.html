<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>V2EX 增强设置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 class="title">V2EX 增强设置</h1>
    
    <div class="setting-item">
      <div class="setting-row">
        <label class="setting-label" for="redirectToggle">
          自动将 v2ex.com 链接重定向到 global.v2ex.co
        </label>
        <label class="switch">
          <input type="checkbox" id="redirectToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
